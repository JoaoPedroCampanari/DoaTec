# Configuração para testes de integração
spring.datasource.url=jdbc:h2:mem:doatec_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Desativar email em testes
spring.mail.host=localhost
spring.mail.port=0

# Desativar H2 console
spring.h2.console.enabled=false

# Desativar devtools
spring.devtools.restart.enabled=false

# Desativar DataSeeder
spring.datasource.initialization-mode=never

# CORS (obrigatório pelo SecurityConfig)
app.cors.allowed-origins=http://localhost:8080
