<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - DoaTec</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/imask"></script>
</head>

<body class="login-page">

<div class="back-button-container">
    <a href="login.html" class="btn btn-secondary">‹ Voltar ao Início</a>
</div>

<div class="login-container">
    <div class="login-box">
        <div class="logo">
            <a href="index.html"><img src="doatec_logo.png" width="200" alt="Logo DoaTec"></a>
        </div>
        <h1>Crie sua Conta</h1>

        <div class="form-group user-type-selection">
            <div>
                <input type="radio" id="typePf" name="userType" value="DOADOR_PF" checked> <label for="typePf" class="radio-label">Pessoa Física</label>
            </div>
            <div>
                <input type="radio" id="typePj" name="userType" value="DOADOR_PJ"> <label for="typePj" class="radio-label">Pessoa Jurídica</label>
            </div>
            <div>
                <input type="radio" id="typeAluno" name="userType" value="ALUNO"> <label for="typeAluno" class="radio-label">Aluno</label>
            </div>
        </div>

        <form id="registerForm" class="application-form">

            <div id="pfFields">
                <div class="form-group">
                    <label for="fullNamePf" id="nameLabel">Nome Completo</label>
                    <input type="text" id="fullNamePf" name="fullNamePf" required>
                </div>
                <div class="form-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" required>
                </div>
            </div>

            <div id="pjFields" style="display: none;">
                <div class="form-group">
                    <label for="companyName">Nome da Empresa (Razão Social)</label>
                    <input type="text" id="companyName" name="companyName">
                </div>
                <div class="form-group">
                    <label for="representativeName">Nome do Representante</label>
                    <input type="text" id="representativeName" name="representativeName">
                </div>
                <div class="form-group">
                    <label for="cnpj">CNPJ</label>
                    <input type="text" id="cnpj" name="cnpj">
                </div>
            </div>

            <div id="alunoFields" style="display: none;">
                <div class="form-group">
                    <label for="fullNameAluno">Nome Completo do Aluno</label>
                    <input type="text" id="fullNameAluno" name="fullNameAluno">
                </div>
                <div class="form-group">
                    <label for="ra">Matrícula (RA)</label>
                    <input type="text" id="ra" name="ra">
                </div>
            </div>

            <hr style="border: 1px solid #eee; margin: 20px 0;">

            <div class="form-group">
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" name="email" required>
            </div>

            <div class="form-group">
                <label for="telefone">Telefone</label>
                <input type="text" id="telefone" name="telefone" placeholder="(00) 00000-0000">
            </div>

            <div class="form-group">
                <label for="cep">CEP</label>
                <input type="text" id="cep" name="cep" placeholder="00000-000" required>
            </div>

            <div class="form-group">
                <label for="regPassword">Crie uma Senha</label>
                <input type="password" id="regPassword" name="password" minlength="6" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirme a Senha</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </div>
            <button type="submit" class="btn btn-primary btn-submit">Registrar</button>
        </form>
        <p class="footer-link">Já tem uma conta? <a href="login.html">Faça o login</a></p>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {

        // --- MÁSCARAS ---
        const cpfMaskOptions = { mask: '000.000.000-00' };
        const cnpjMaskOptions = { mask: '00.000.000/0000-00' };
        const raMaskOptions = { mask: '0000000000000' };
        const telefoneMaskOptions = { mask: '(00) 00000-0000' };
        const cepMaskOptions = { mask: '00000-000' };

        const cpfMask = IMask(document.getElementById('cpf'), cpfMaskOptions);
        const cnpjMask = IMask(document.getElementById('cnpj'), cnpjMaskOptions);
        const raMask = IMask(document.getElementById('ra'), raMaskOptions);
        const telefoneMask = IMask(document.getElementById('telefone'), telefoneMaskOptions);
        const cepMask = IMask(document.getElementById('cep'), cepMaskOptions);

        // --- ALTERNA CAMPOS DO FORMULÁRIO ---
        const userTypeRadios = document.querySelectorAll('input[name="userType"]');
        const pfFields = document.getElementById('pfFields');
        const pjFields = document.getElementById('pjFields');
        const alunoFields = document.getElementById('alunoFields');
        const registerForm = document.getElementById('registerForm');

        function updateUserForm() {
            const selectedType = document.querySelector('input[name="userType"]:checked').value;

            // Remove required de todos os campos específicos
            document.getElementById('fullNamePf').removeAttribute('required');
            document.getElementById('cpf').removeAttribute('required');
            document.getElementById('companyName').removeAttribute('required');
            document.getElementById('representativeName').removeAttribute('required');
            document.getElementById('cnpj').removeAttribute('required');
            document.getElementById('fullNameAluno').removeAttribute('required');
            document.getElementById('ra').removeAttribute('required');

            pfFields.style.display = 'none';
            pjFields.style.display = 'none';
            alunoFields.style.display = 'none';

            // Limpa valores
            cpfMask.value = '';
            cnpjMask.value = '';
            raMask.value = '';
            document.getElementById('fullNamePf').value = '';
            document.getElementById('companyName').value = '';
            document.getElementById('representativeName').value = '';
            document.getElementById('fullNameAluno').value = '';

            if (selectedType === 'DOADOR_PF') {
                pfFields.style.display = 'block';
                document.getElementById('fullNamePf').setAttribute('required', 'required');
                document.getElementById('cpf').setAttribute('required', 'required');
            } else if (selectedType === 'DOADOR_PJ') {
                pjFields.style.display = 'block';
                document.getElementById('companyName').setAttribute('required', 'required');
                document.getElementById('representativeName').setAttribute('required', 'required');
                document.getElementById('cnpj').setAttribute('required', 'required');
            } else if (selectedType === 'ALUNO') {
                alunoFields.style.display = 'block';
                document.getElementById('fullNameAluno').setAttribute('required', 'required');
                document.getElementById('ra').setAttribute('required', 'required');
            }
        }

        userTypeRadios.forEach(radio => {
            radio.addEventListener('change', updateUserForm);
        });
        updateUserForm();

        // --- ENVIO DO FORMULÁRIO PARA ENDPOINTS ESPECIALIZADOS ---
        registerForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const selectedType = document.querySelector('input[name="userType"]:checked').value;
            const email = document.getElementById('regEmail').value;
            const telefone = document.getElementById('telefone').value;
            const endereco = cepMask.unmaskedValue;
            const senha = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (senha !== confirmPassword) {
                alert('As senhas não coincidem!');
                return;
            }

            let endpoint;
            let body;

            // Monta o body conforme o tipo de usuário e seleciona o endpoint
            if (selectedType === 'DOADOR_PF') {
                endpoint = '/api/register/doador-pf';
                body = {
                    nome: document.getElementById('fullNamePf').value,
                    email: email,
                    cpf: cpfMask.unmaskedValue,
                    telefone: telefone,
                    endereco: endereco,
                    senha: senha
                };
            } else if (selectedType === 'DOADOR_PJ') {
                endpoint = '/api/register/doador-pj';
                body = {
                    razaoSocial: document.getElementById('companyName').value,
                    nomeRepresentante: document.getElementById('representativeName').value,
                    email: email,
                    cnpj: cnpjMask.unmaskedValue,
                    telefone: telefone,
                    endereco: endereco,
                    senha: senha
                };
            } else if (selectedType === 'ALUNO') {
                endpoint = '/api/register/aluno';
                body = {
                    nome: document.getElementById('fullNameAluno').value,
                    email: email,
                    ra: raMask.unmaskedValue,
                    telefone: telefone,
                    endereco: endereco,
                    senha: senha
                };
            }

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                if (response.ok) {
                    const data = await response.json();
                    window.location.href = 'login.html';
                } else {
                    // Tenta extrair mensagem de erro do JSON
                    let errorMsg = 'Erro no registro';
                    try {
                        const errorData = await response.json();
                        console.log('Erro recebido:', errorData);

                        if (errorData.details && errorData.details.length > 0) {
                            // Erros de validação do Bean Validation
                            errorMsg = errorData.details.join('\n');
                        } else if (errorData.message) {
                            errorMsg = errorData.message;
                        } else if (errorData.error) {
                            errorMsg = errorData.error;
                        }
                    } catch (jsonError) {
                        // Se não for JSON, tenta pegar texto
                        const errorText = await response.text();
                        console.log('Erro texto:', errorText);
                        if (errorText) {
                            errorMsg = errorText;
                        }
                    }
                    alert(errorMsg);
                }
            } catch (error) {
                console.error('Erro na requisição:', error);
                alert('Ocorreu um erro ao tentar registrar. Verifique a conexão com o servidor.');
            }
        });
    });
</script>
<script src="js/theme-switcher.js"></script>
</body>

</html>
