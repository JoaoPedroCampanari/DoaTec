<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - DoaTec</title>
    <script>(function(){var t=localStorage.getItem('theme');if(t==='dark')document.documentElement.classList.add('dark-mode')})()</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="js/vendor/imask.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</head>

<body class="login-page">

<div class="back-button-container">
    <a href="login.html" class="btn btn-secondary">Voltar ao Início</a>
</div>

<div class="login-container">
    <div class="login-box" style="max-width: 500px;">
        <div class="logo">
            <a href="index.html"><img src="doatec_logo.png" width="200" alt="Logo DoaTec"></a>
        </div>
        <h1>Crie sua Conta</h1>

        <!-- Stepper Progress -->
        <div class="stepper-container">
            <div class="stepper-progress">
                <div class="step active" data-step="1">
                    <span class="step-number">1</span>
                    <span class="step-label">Acesso</span>
                </div>
                <div class="step" data-step="2">
                    <span class="step-number">2</span>
                    <span class="step-label">Dados</span>
                </div>
                <div class="step" data-step="3">
                    <span class="step-number">3</span>
                    <span class="step-label">Localização</span>
                </div>
            </div>
        </div>

        <form id="registerForm" class="application-form">
            <!-- ETAPA 1: Dados de Acesso -->
            <div class="form-step" data-step="1">
                <div class="form-group">
                    <label for="regEmail">Email *</label>
                    <input type="email" id="regEmail" name="email" required>
                    <small id="emailFeedback" class="email-feedback"></small>
                </div>
                <div class="form-group">
                    <label for="regPassword">Crie uma Senha</label>
                    <input type="password" id="regPassword" name="password" minlength="6" required>
                    <small class="form-text">Minimo de 6 caracteres</small>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirme a Senha</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>
            </div>

            <!-- ETAPA 2: Dados Pessoais/Empresariais -->
            <div class="form-step" data-step="2" style="display: none;">
                <!-- Selecao de Tipo de Usuario -->
                <div class="form-group user-type-selection">
                    <label>Qual seu perfil?</label>
                    <div>
                        <input type="radio" id="typePf" name="userType" value="DOADOR_PF" checked> <label for="typePf" class="radio-label">Pessoa Física</label>
                    </div>
                    <div>
                        <input type="radio" id="typePj" name="userType" value="DOADOR_PJ"> <label for="typePj" class="radio-label">Pessoa Jurídica</label>
                    </div>
                    <div>
                        <input type="radio" id="typeAluno" name="userType" value="ALUNO"> <label for="typeAluno" class="radio-label">Aluno</label>
                    </div>
                </div>

                <!-- Campos Pessoa Fisica -->
                <div id="pfFields">
                    <div class="form-group">
                        <label for="fullNamePf">Nome Completo</label>
                        <input type="text" id="fullNamePf" name="fullNamePf" required>
                    </div>
                    <div class="form-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                    </div>
                </div>

                <!-- Campos Pessoa Juridica -->
                <div id="pjFields" style="display: none;">
                    <div class="form-group">
                        <label for="companyName">Nome da Empresa (Razão Social)</label>
                        <input type="text" id="companyName" name="companyName" required>
                    </div>
                    <div class="form-group">
                        <label for="representativeName">Nome do Representante</label>
                        <input type="text" id="representativeName" name="representativeName" required>
                    </div>
                    <div class="form-group">
                        <label for="cnpj">CNPJ</label>
                        <input type="text" id="cnpj" name="cnpj" placeholder="00.000.000/0000-00" required>
                    </div>
                </div>

                <!-- Campos Aluno -->
                <div id="alunoFields" style="display: none;">
                    <div class="form-group">
                        <label for="fullNameAluno">Nome Completo do Aluno</label>
                        <input type="text" id="fullNameAluno" name="fullNameAluno" required>
                    </div>
                    <div class="form-group">
                        <label for="ra">Matrícula (RA)</label>
                        <input type="text" id="ra" name="ra" placeholder="0000000000000" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" name="telefone" placeholder="(00) 00000-0000">
                </div>
            </div>

            <!-- ETAPA 3: Localizacao -->
            <div class="form-step" data-step="3" style="display: none;">
                <div class="form-group">
                    <label for="cep">CEP *</label>
                    <input type="text" id="cep" name="cep" placeholder="00000-000" required>
                    <small class="form-text">Digite o CEP para preencher automaticamente</small>
                </div>
                <div class="form-group">
                    <label for="logradouro">Logradouro *</label>
                    <input type="text" id="logradouro" name="logradouro" readonly required>
                </div>
                <div class="form-group">
                    <label for="numero">Numero *</label>
                    <input type="text" id="numero" name="numero" required>
                </div>
                <div class="form-group">
                    <label for="bairro">Bairro *</label>
                    <input type="text" id="bairro" name="bairro" readonly required>
                </div>
                <div class="form-group">
                    <label for="cidade">Cidade *</label>
                    <input type="text" id="cidade" name="cidade" readonly required>
                </div>
                <div class="form-group">
                    <label for="estado">Estado *</label>
                    <input type="text" id="estado" name="estado" maxlength="2" readonly required>
                </div>
            </div>

            <!-- Botoes de Navegacao -->
            <div class="form-navigation">
                <button type="button" class="btn btn-secondary" id="prevBtn" style="display: none;">← Voltar</button>
                <button type="button" class="btn btn-primary" id="nextBtn">Próximo →</button>
                <button type="submit" class="btn btn-primary btn-submit" id="submitBtn" style="display: none;">Registrar</button>
            </div>
        </form>

        <p class="footer-link" style="margin-top: 24px; text-align: center;">Já tem uma conta? <a href="login.html" style="color: var(--primary-600); font-weight: 500;">Faça o login</a></p>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // ==================== VARIAVEIS GLOBAIS ====================
        let currentStep = 1;
        const totalSteps = 3;

        // ==================== MASCARAS ====================
        const cpfMask = IMask(document.getElementById('cpf'), { mask: '000.000.000-00' });
        const cnpjMask = IMask(document.getElementById('cnpj'), { mask: '00.000.000/0000-00' });
        const raMask = IMask(document.getElementById('ra'), { mask: '0000000000000' });
        const telefoneMask = IMask(document.getElementById('telefone'), { mask: '(00) 00000-0000' });
        const cepMask = IMask(document.getElementById('cep'), { mask: '00000-000' });

        // ==================== ELEMENTOS DO DOM ====================
        const userTypeRadios = document.querySelectorAll('input[name="userType"]');
        const pfFields = document.getElementById('pfFields');
        const pjFields = document.getElementById('pjFields');
        const alunoFields = document.getElementById('alunoFields');
        const registerForm = document.getElementById('registerForm');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const submitBtn = document.getElementById('submitBtn');

        // Elementos de validacao de email
        const emailInput = document.getElementById('regEmail');
        const emailFeedback = document.getElementById('emailFeedback');
        const passwordInput = document.getElementById('regPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');

        // Regex de validacao de email estrita
        const EMAIL_REGEX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        // Estado de validacao
        let emailValido = false;

        // ==================== VALIDACAO DE EMAIL EM TEMPO REAL ====================
        function validateEmail(email) {
            return EMAIL_REGEX.test(email);
        }

        function atualizarEstadoBotaoProximo() {
            if (currentStep === 1) {
                const senha = passwordInput.value;
                const confirma = confirmPasswordInput.value;
                const senhasValidas = senha.length >= 6 && senha === confirma;

                nextBtn.disabled = !emailValido || !senhasValidas;
            }
        }

        emailInput.addEventListener('input', function() {
            const email = this.value.trim();

            if (email === '') {
                // Campo vazio - remove estilos
                this.classList.remove('is-valid', 'is-invalid');
                emailFeedback.textContent = '';
                emailFeedback.classList.remove('valid', 'invalid');
                emailValido = false;
            } else if (validateEmail(email)) {
                // Email valido
                this.classList.remove('is-invalid');
                this.classList.add('is-valid');
                emailFeedback.textContent = '';
                emailFeedback.classList.remove('invalid');
                emailValido = true;
            } else {
                // Email invalido
                this.classList.remove('is-valid');
                this.classList.add('is-invalid');
                emailFeedback.textContent = 'Insira um e-mail valido';
                emailFeedback.classList.remove('valid');
                emailFeedback.classList.add('invalid');
                emailValido = false;
            }

            atualizarEstadoBotaoProximo();
        });

        // Event listeners para campos de senha (atualizam botao)
        passwordInput.addEventListener('input', atualizarEstadoBotaoProximo);
        confirmPasswordInput.addEventListener('input', atualizarEstadoBotaoProximo);

        // ==================== STEPPER - NAVEGACAO ====================
        function showStep(step) {
            // Esconde todas as etapas
            document.querySelectorAll('.form-step').forEach(s => s.style.display = 'none');

            // Mostra a etapa atual
            document.querySelector(`.form-step[data-step="${step}"]`).style.display = 'block';

            // Atualiza indicadores de progresso
            document.querySelectorAll('.step').forEach((s, i) => {
                s.classList.remove('active', 'completed');
                if (i + 1 < step) s.classList.add('completed');
                if (i + 1 === step) s.classList.add('active');
            });

            // Atualiza botoes
            prevBtn.style.display = step === 1 ? 'none' : 'block';
            nextBtn.style.display = step === totalSteps ? 'none' : 'block';
            submitBtn.style.display = step === totalSteps ? 'block' : 'none';

            // Atualiza estado do botao ao mudar de etapa
            atualizarEstadoBotaoProximo();

            // Atualiza campos visiveis baseado no tipo de usuario (na etapa 2)
            if (step === 2) {
                updateUserForm();
            }
        }

        function validateStep(step) {
            const stepEl = document.querySelector(`.form-step[data-step="${step}"]`);
            const inputs = stepEl.querySelectorAll('input[required]');
            let valid = true;

            inputs.forEach(input => {
                // Remove marcacao de erro anterior
                input.classList.remove('viacep-error');

                if (!input.value.trim()) {
                    input.classList.add('viacep-error');
                    valid = false;
                }
            });

            // Valida especificos
            if (step === 1) {
                // Validar email com regex estrita
                const email = emailInput.value.trim();
                if (!validateEmail(email)) {
                    // Ja tratado pelo event listener
                    emailInput.focus();
                    return false;
                }

                const senha = passwordInput.value;
                const confirma = confirmPasswordInput.value;
                if (senha !== confirma) {
                    DoaTec.showToast('As senhas não coincidem!', 'error');
                    return false;
                }
                if (senha.length < 6) {
                    DoaTec.showToast('A senha deve ter no mínimo 6 dígitos.', 'error');
                    return false;
                }
            }

            // Valida etapa 3 - Endereco
            if (step === 3) {
                const cep = document.getElementById('cep');
                const cepLimpo = cep.value.replace(/\D/g, '');
                if (cepLimpo.length !== 8) {
                    DoaTec.showToast('CEP inválido.', 'error');
                    cep.focus();
                    return false;
                }
                const logradouro = document.getElementById('logradouro');
                const numero = document.getElementById('numero');
                const bairro = document.getElementById('bairro');
                const cidade = document.getElementById('cidade');
                const estado = document.getElementById('estado');

                if (!logradouro.value.trim()) {
                    DoaTec.showToast('Logradouro inválido.', 'error');
                    return false;
                }
                if (!numero.value.trim()) {
                    DoaTec.showToast('Número do endereço é obrigatório.', 'error');
                    numero.focus();
                    return false;
                }
                if (!bairro.value.trim()) {
                    DoaTec.showToast('Bairro inválido.', 'error');
                    return false;
                }
                if (!cidade.value.trim()) {
                    DoaTec.showToast('Cidade inválida.', 'error');
                    return false;
                }
                if (!estado.value.trim()) {
                    DoaTec.showToast('Estado inválido.', 'error');
                    return false;
                }
            }

            return valid;
        }

        nextBtn.addEventListener('click', () => {
            if (validateStep(currentStep)) {
                currentStep++;
                showStep(currentStep);
            }
        });

        prevBtn.addEventListener('click', () => {
            currentStep--;
            showStep(currentStep);
        });

        // ==================== ALTERNA CAMPOS POR TIPO DE USUARIO ====================
        function updateUserForm() {
            const selectedType = document.querySelector('input[name="userType"]:checked').value;

            // Remove required de todos os campos especificos
            document.getElementById('fullNamePf').removeAttribute('required');
            document.getElementById('cpf').removeAttribute('required');
            document.getElementById('companyName').removeAttribute('required');
            document.getElementById('representativeName').removeAttribute('required');
            document.getElementById('cnpj').removeAttribute('required');
            document.getElementById('fullNameAluno').removeAttribute('required');
            document.getElementById('ra').removeAttribute('required');

            pfFields.style.display = 'none';
            pjFields.style.display = 'none';
            alunoFields.style.display = 'none';

            // Limpa valores
            cpfMask.value = '';
            cnpjMask.value = '';
            raMask.value = '';
            document.getElementById('fullNamePf').value = '';
            document.getElementById('companyName').value = '';
            document.getElementById('representativeName').value = '';
            document.getElementById('fullNameAluno').value = '';

            if (selectedType === 'DOADOR_PF') {
                pfFields.style.display = 'block';
                document.getElementById('fullNamePf').setAttribute('required', 'required');
                document.getElementById('cpf').setAttribute('required', 'required');
            } else if (selectedType === 'DOADOR_PJ') {
                pjFields.style.display = 'block';
                document.getElementById('companyName').setAttribute('required', 'required');
                document.getElementById('representativeName').setAttribute('required', 'required');
                document.getElementById('cnpj').setAttribute('required', 'required');
            } else if (selectedType === 'ALUNO') {
                alunoFields.style.display = 'block';
                document.getElementById('fullNameAluno').setAttribute('required', 'required');
                document.getElementById('ra').setAttribute('required', 'required');
            }
        }

        userTypeRadios.forEach(radio => {
            radio.addEventListener('change', updateUserForm);
        });

        // ==================== VIACEP - BUSCA DE ENDERECO ====================
        async function buscarCEP(cep) {
            const cepLimpo = cep.replace(/\D/g, '');

            if (cepLimpo.length !== 8) {
                return { erro: 'CEP deve ter 8 dígitos' };
            }

            try {
                const response = await fetch(`https://viacep.com.br/ws/${cepLimpo}/json/`);
                const data = await response.json();

                if (data.erro) {
                    return { erro: 'CEP não encontrado' };
                }

                return {
                    logradouro: data.logradouro || '',
                    bairro: data.bairro || '',
                    cidade: data.localidade || '',
                    estado: data.uf || ''
                };
            } catch (error) {
                return { erro: 'Erro ao buscar CEP. Verifique sua conexao.' };
            }
        }

        function liberarCamposEndereco() {
            ['logradouro', 'bairro', 'cidade', 'estado'].forEach(id => {
                const el = document.getElementById(id);
                el.removeAttribute('readonly');
                el.classList.remove('viacep-auto');
            });
        }

        function travarCamposEndereco() {
            ['logradouro', 'bairro', 'cidade', 'estado'].forEach(id => {
                const el = document.getElementById(id);
                el.setAttribute('readonly', 'readonly');
                el.classList.add('viacep-auto');
            });
        }

        document.getElementById('cep').addEventListener('blur', async function() {
            const cep = cepMask.unmaskedValue;

            if (cep.length === 8) {
                // Mostra loading
                this.classList.add('viacep-loading');

                const endereco = await buscarCEP(cep);

                this.classList.remove('viacep-loading');

                if (endereco.erro) {
                    DoaTec.showToast(endereco.erro, 'error');
                    // Libera campos para edicao manual
                    liberarCamposEndereco();
                } else {
                    // Preenche campos automaticamente
                    document.getElementById('logradouro').value = endereco.logradouro;
                    document.getElementById('bairro').value = endereco.bairro;
                    document.getElementById('cidade').value = endereco.cidade;
                    document.getElementById('estado').value = endereco.estado;

                    // Marca como preenchido automaticamente
                    travarCamposEndereco();

                    // Foca no campo numero se logradouro foi preenchido
                    if (endereco.logradouro) {
                        document.getElementById('numero').focus();
                    }
                }
            }
        });

        // ==================== ENVIO DO FORMULARIO ====================
        registerForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            if (!validateStep(3)) {
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            DoaTec.setButtonLoading(submitBtn, true);

            const selectedType = document.querySelector('input[name="userType"]:checked').value;
            const email = document.getElementById('regEmail').value;
            const telefone = telefoneMask.unmaskedValue;
            const senha = document.getElementById('regPassword').value;
            const cep = cepMask.unmaskedValue;
            const logradouro = document.getElementById('logradouro').value;
            const numero = document.getElementById('numero').value;
            const bairro = document.getElementById('bairro').value;
            const cidade = document.getElementById('cidade').value;
            const estado = document.getElementById('estado').value;

            let endpoint;
            let body;

            if (selectedType === 'DOADOR_PF') {
                endpoint = '/api/register/doador-pf';
                body = {
                    nome: document.getElementById('fullNamePf').value,
                    email: email,
                    cpf: cpfMask.unmaskedValue,
                    telefone: telefone,
                    cep: cep,
                    logradouro: logradouro,
                    numero: numero,
                    bairro: bairro,
                    cidade: cidade,
                    estado: estado,
                    senha: senha
                };
            } else if (selectedType === 'DOADOR_PJ') {
                endpoint = '/api/register/doador-pj';
                body = {
                    razaoSocial: document.getElementById('companyName').value,
                    nomeRepresentante: document.getElementById('representativeName').value,
                    email: email,
                    cnpj: cnpjMask.unmaskedValue,
                    telefone: telefone,
                    cep: cep,
                    logradouro: logradouro,
                    numero: numero,
                    bairro: bairro,
                    cidade: cidade,
                    estado: estado,
                    senha: senha
                };
            } else if (selectedType === 'ALUNO') {
                endpoint = '/api/register/aluno';
                body = {
                    nome: document.getElementById('fullNameAluno').value,
                    email: email,
                    ra: raMask.unmaskedValue,
                    telefone: telefone,
                    cep: cep,
                    logradouro: logradouro,
                    numero: numero,
                    bairro: bairro,
                    cidade: cidade,
                    estado: estado,
                    senha: senha
                };
            }

            try {
                const response = await apiFetch(endpoint, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                if (response.ok) {
                    const data = await response.json();
                    window.location.href = 'login.html';
                } else {
                    let errorMsg = 'Erro no registro';
                    try {
                        const errorData = await response.json();
                        console.log('Erro recebido:', errorData);

                        if (errorData.details && errorData.details.length > 0) {
                            errorMsg = errorData.details.join('\n');
                        } else if (errorData.message) {
                            errorMsg = errorData.message;
                        } else if (errorData.error) {
                            errorMsg = errorData.error;
                        }
                    } catch (jsonError) {
                        const errorText = await response.text();
                        console.log('Erro texto:', errorText);
                        if (errorText) {
                            errorMsg = errorText;
                        }
                    }
                    DoaTec.showToast(errorMsg, 'error');
                }
            } catch (error) {
                console.error('Erro na requisicao:', error);
                DoaTec.showToast('Ocorreu um erro ao tentar registrar. Verifique a conexão com o servidor.', 'error');
            } finally {
                DoaTec.setButtonLoading(submitBtn, false);
            }
        });

        // Inicializa na etapa 1
        showStep(1);

        // Estado inicial do botao Proximo (desabilitado ate email e senhas validos)
        nextBtn.disabled = true;
        atualizarEstadoBotaoProximo();
    });
</script>
<script src="js/theme-switcher.js"></script>
</body>

</html>
