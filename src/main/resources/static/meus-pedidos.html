<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Pedidos - DoaTec</title>
    <script>(function(){var t=localStorage.getItem('theme');if(t==='dark')document.documentElement.classList.add('dark-mode')})()</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="doatec_logo.png" type="image/png">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo"><a href="index.html"><img src="doatec_logo.png" width="180" alt="Logo DoaTec"></a></div>
        <ul class="nav-links">
            <li><a href="index.html">Início</a></li>
            <li id="queroDoarDropdownItem" class="nav-dropdown">
                <a href="#">Quero Doar</a>
                <ul class="dropdown-menu"></ul>
            </li>
            <li id="solicitarDoacaoDropdownItem" class="nav-dropdown">
                <a href="#">Solicitar Doação</a>
                <ul class="dropdown-menu"></ul>
            </li>
            <li><a href="suporte.html">Suporte</a></li>
            <li><a href="sobre.html">Sobre Nós</a></li>
        </ul>
        <div class="navbar-right">
            <!-- Notificações -->
            <div id="notificationsContainer" class="notification-container">
                <button class="notification-bell" title="Notificações">🔔</button>
                <span class="notification-badge"></span>
                <div class="notification-dropdown">
                    <div class="notification-header">
                        <h4>Notificações</h4>
                        <button onclick="Notifications.markAllAsRead()">Marcar todas como lidas</button>
                    </div>
                    <div class="notifications-list"></div>
                </div>
            </div>
            <button id="theme-toggle" class="btn-theme-toggle">🌙</button>
            <ul class="nav-links-account">
                <li id="minhaContaDropdownItem" class="nav-dropdown">
                    <a href="#">Minha Conta</a>
                    <ul class="dropdown-menu"></ul>
                </li>
            </ul>
            <button id="profileButton" class="btn btn-primary" style="margin-left: 10px; display: none;">Entrar</button>
            <div class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>
</header>

<main>
    <section class="application-section">
        <div class="container">
            <div class="application-header">
                <h1>Meus Pedidos de Equipamento</h1>
                <p>Acompanhe aqui o status de todas as suas solicitações.</p>
            </div>
            <div id="pedidosContainer" class="donations-list">
            </div>
        </div>
    </section>
</main>

<footer>
    <div class="container">
        <p>&copy; 2025 DoaTec - Plataforma de Doação de Tecnologia. Fatec Garça.</p>
    </div>
</footer>

<script src="js/main.js?v=2"></script>
<script src="js/auth.js?v=2"></script>
<script src="js/notifications.js?v=2"></script>
<script src="js/theme-switcher.js"></script>
<script src="js/nav-visibility.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const pedidosContainer = document.getElementById('pedidosContainer');

        // Verifica sessão com backend
        const loggedInUser = await Auth.checkSession();

        if (!loggedInUser || !loggedInUser.id) {
            window.location.href = 'login.html';
            return;
        }

        if (loggedInUser.tipoPessoa !== 'ALUNO') {
            pedidosContainer.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <h3>Acesso Restrito</h3>
                    <p>Esta página é exclusiva para alunos cadastrados.</p>
                </div>
            `;
            return;
        }

        apiFetch('/api/users/me/solicitacoes')
            .then(response => response.json())
            .then(pedidos => {
                if (pedidos.length === 0) {
                    pedidosContainer.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                                    <line x1="8" y1="21" x2="16" y2="21"/>
                                    <line x1="12" y1="17" x2="12" y2="21"/>
                                </svg>
                            </div>
                            <h3>Nenhum pedido realizado</h3>
                            <p>Você ainda não fez nenhuma solicitação de equipamento.</p>
                            <a href="aluno.html" class="btn btn-primary" style="margin-top: 16px;">Fazer Solicitação</a>
                        </div>
                    `;
                    return;
                }

                pedidos.forEach(pedido => {
                    const pedidoCard = document.createElement('div');
                    pedidoCard.className = 'donation-card';

                    const statusClass = DoaTec.getStatusClass(pedido.status);
                    const statusText = DoaTec.translateStatus(pedido.status);

                    pedidoCard.innerHTML = `
                        <div class="donation-content" style="flex: 1;">
                            <div class="donation-header">
                                <h3 class="donation-title">Pedido #${pedido.id}</h3>
                                <span class="status-pill ${statusClass}">${statusText}</span>
                            </div>
                            <span class="donation-date">${formatDate(pedido.dataSolicitacao)}</span>
                            <div class="donation-meta">
                                <span class="donation-meta-item">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px;">
                                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                                        <line x1="8" y1="21" x2="16" y2="21"/>
                                        <line x1="12" y1="17" x2="12" y2="21"/>
                                    </svg>
                                    <strong>Preferência:</strong> ${escapeHtml(pedido.preferenciaEquipamento || 'Não especificada')}
                                </span>
                            </div>
                            <div class="donation-items" style="margin-top: 12px;">
                                <div class="donation-item">
                                    <strong>Justificativa:</strong>
                                    <p style="margin: 8px 0 0 0; line-height: 1.6;">${escapeHtml(pedido.justificativa || 'Não informada')}</p>
                                </div>
                            </div>
                        </div>
                    `;
                    pedidosContainer.appendChild(pedidoCard);
                });
            })
            .catch(error => {
                console.error('Erro:', error);
                pedidosContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="12" y1="8" x2="12" y2="12"/>
                                <line x1="12" y1="16" x2="12.01" y2="16"/>
                            </svg>
                        </div>
                        <h3>Erro ao carregar</h3>
                        <p style="color: var(--color-danger, #dc3545);">Ocorreu um erro ao carregar seus pedidos. Tente novamente mais tarde.</p>
                    </div>
                `;
            });
    });

    // Usando funções globais de DoaTec (main.js)
    const formatDate = DoaTec.formatDate;
    const getStatusClass = DoaTec.getStatusClass;
    const translateStatus = DoaTec.translateStatus;
    const escapeHtml = DoaTec.escapeHtml;
</script>
</body>
</html>
