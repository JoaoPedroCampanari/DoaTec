<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - DoaTec</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="doatec_logo.png" type="image/png">
    <script src="https://unpkg.com/imask"></script>
</head>
<body class="login-page perfil-page">
<div class="login-container">
    <div class="login-box">
        <div class="logo">
            <a href="index.html"><img src="doatec_logo.png" width="200" alt="Logo DoaTec"></a>
        </div>

        <!-- Profile Header -->
        <div class="profile-header">
            <div class="profile-avatar" id="profileAvatar">
                <span id="avatarInitial">?</span>
            </div>
            <h1 class="profile-name" id="profileName">Carregando...</h1>
            <p class="profile-role" id="profileRole">-</p>
        </div>

        <div class="profile-sections-container">
            <section class="profile-readonly-section">
                <h2>Dados de Registro</h2>
                <div class="form-group">
                    <label for="profileNome">Nome:</label>
                    <input type="text" id="profileNome" disabled>
                </div>
                <div class="form-group">
                    <label for="profileTipo">Tipo de Usuário:</label>
                    <input type="text" id="profileTipo" disabled>
                </div>
                <div class="form-group">
                    <label for="profileDocumento">Documento:</label>
                    <input type="text" id="profileDocumento" disabled>
                </div>
            </section>

            <form id="profileForm" class="application-form profile-editable-form">
                <fieldset>
                    <legend>Informações de Contato e Acesso</legend>
                    <div class="profile-fields-grid">
                        <div class="form-group">
                            <label for="profileEmail">Email:</label>
                            <input type="email" id="profileEmail">
                        </div>
                        <div class="form-group">
                            <label for="profileTelefone">Telefone:</label>
                            <input type="tel" id="profileTelefone">
                        </div>
                        <div class="form-group full-width">
                            <label for="profileSenha">Nova Senha (deixe em branco para não alterar):</label>
                            <input type="password" id="profileSenha" minlength="6">
                        </div>
                        <div class="form-group full-width">
                            <label for="profileConfirmarSenha">Confirmar Nova Senha:</label>
                            <input type="password" id="profileConfirmarSenha" minlength="6">
                        </div>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Endereço</legend>
                    <div class="form-group">
                        <label for="profileCep">CEP:</label>
                        <input type="text" id="profileCep" placeholder="00000-000">
                        <small class="form-text">Digite o CEP para preencher automaticamente</small>
                    </div>
                    <div class="profile-fields-grid">
                        <div class="form-group full-width">
                            <label for="profileLogradouro">Logradouro:</label>
                            <input type="text" id="profileLogradouro" readonly>
                        </div>
                        <div class="form-group">
                            <label for="profileNumero">Número:</label>
                            <input type="text" id="profileNumero">
                        </div>
                        <div class="form-group">
                            <label for="profileBairro">Bairro:</label>
                            <input type="text" id="profileBairro" readonly>
                        </div>
                        <div class="form-group">
                            <label for="profileCidade">Cidade:</label>
                            <input type="text" id="profileCidade" readonly>
                        </div>
                        <div class="form-group">
                            <label for="profileEstado">Estado:</label>
                            <input type="text" id="profileEstado" maxlength="2" readonly>
                        </div>
                    </div>
                </fieldset>
                <button type="submit" class="btn btn-primary btn-submit">Atualizar Perfil</button>
            </form>
        </div>

        <hr style="margin: 20px 0;">

        <div class="profile-bottom-buttons">
            <a href="index.html" id="backToHomeButton" class="btn btn-secondary">Voltar ao Início</a>
            <button id="logoutButton" class="btn btn-secondary">Sair da Conta</button>
        </div>
    </div>
</div>

<script src="js/main.js"></script>
<script src="js/theme-switcher.js"></script>
<script src="js/auth.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const profileForm = document.getElementById('profileForm');
        const profileNomeInput = document.getElementById('profileNome');
        const profileTipoInput = document.getElementById('profileTipo');
        const profileDocumentoInput = document.getElementById('profileDocumento');
        const profileEmailInput = document.getElementById('profileEmail');
        const profileSenhaInput = document.getElementById('profileSenha');
        const profileConfirmarSenhaInput = document.getElementById('profileConfirmarSenha');
        const profileCepInput = document.getElementById('profileCep');
        const profileLogradouroInput = document.getElementById('profileLogradouro');
        const profileNumeroInput = document.getElementById('profileNumero');
        const profileBairroInput = document.getElementById('profileBairro');
        const profileCidadeInput = document.getElementById('profileCidade');
        const profileEstadoInput = document.getElementById('profileEstado');
        const profileTelefoneInput = document.getElementById('profileTelefone');
        const logoutButton = document.getElementById('logoutButton');

        // Profile header elements
        const profileName = document.getElementById('profileName');
        const profileRole = document.getElementById('profileRole');
        const profileAvatar = document.getElementById('profileAvatar');
        const avatarInitial = document.getElementById('avatarInitial');

        // Mascaras
        const cepMask = IMask(profileCepInput, { mask: '00000-000' });
        const telefoneMask = IMask(profileTelefoneInput, { mask: '(00) 00000-0000' });

        // Verifica sessao com o backend
        const loggedInUser = await Auth.checkSession();

        if (loggedInUser && loggedInUser.id) {
            // Set avatar initial
            const name = loggedInUser.nome || 'U';
            avatarInitial.textContent = name.charAt(0).toUpperCase();
            profileAvatar.style.backgroundColor = getAvatarColor(name);

            fetch(`/api/users/${loggedInUser.id}`, { credentials: 'include' })
                .then(response => {
                    if (response.ok) {
                        return response.json();
                    }
                    throw new Error('Falha ao carregar dados do perfil.');
                })
                .then(userData => {
                    // Update header
                    profileName.textContent = userData.nome || 'Usuário';
                    profileRole.textContent = formatUserRole(userData.tipoPessoa);

                    // Update form fields
                    profileNomeInput.value = userData.nome || '';
                    profileTipoInput.value = formatUserRole(userData.tipoPessoa);
                    profileDocumentoInput.value = formatDocument(userData);

                    profileEmailInput.value = userData.email || '';
                    cepMask.value = userData.cep || '';
                    profileLogradouroInput.value = userData.logradouro || '';
                    profileNumeroInput.value = userData.numero || '';
                    profileBairroInput.value = userData.bairro || '';
                    profileCidadeInput.value = userData.cidade || '';
                    profileEstadoInput.value = userData.estado || '';
                    telefoneMask.value = userData.telefone || '';

                    // Marca campos preenchidos via CEP
                    if (userData.logradouro || userData.bairro || userData.cidade) {
                        ['logradouro', 'bairro', 'cidade', 'estado'].forEach(id => {
                            const el = document.getElementById('profile' + id.charAt(0).toUpperCase() + id.slice(1));
                            if (el) el.classList.add('viacep-auto');
                        });
                    }
                })
                .catch(error => {
                    console.error('Erro ao carregar perfil:', error);
                    alert('Não foi possível carregar os dados do seu perfil. Por favor, tente novamente.');
                    window.location.href = 'login.html';
                });

            // Busca CEP ViaCEP
            profileCepInput.addEventListener('blur', async function() {
                const cep = cepMask.unmaskedValue;

                if (cep.length === 8) {
                    this.classList.add('viacep-loading');

                    try {
                        const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                        const data = await response.json();

                        this.classList.remove('viacep-loading');

                        if (data.erro) {
                            alert('CEP não encontrado');
                            // Libera campos para edicao manual
                            ['logradouro', 'bairro', 'cidade', 'estado'].forEach(id => {
                                const el = document.getElementById('profile' + id.charAt(0).toUpperCase() + id.slice(1));
                                if (el) {
                                    el.removeAttribute('readonly');
                                    el.classList.remove('viacep-auto');
                                }
                            });
                        } else {
                            profileLogradouroInput.value = data.logradouro || '';
                            profileBairroInput.value = data.bairro || '';
                            profileCidadeInput.value = data.localidade || '';
                            profileEstadoInput.value = data.uf || '';

                            // Marca como preenchido automaticamente
                            ['logradouro', 'bairro', 'cidade', 'estado'].forEach(id => {
                                const el = document.getElementById('profile' + id.charAt(0).toUpperCase() + id.slice(1));
                                if (el) {
                                    el.setAttribute('readonly', 'readonly');
                                    el.classList.add('viacep-auto');
                                }
                            });

                            if (data.logradouro) {
                                profileNumeroInput.focus();
                            }
                        }
                    } catch (err) {
                        this.classList.remove('viacep-loading');
                        alert('Erro ao buscar CEP. Verifique sua conexão.');
                    }
                }
            });

            profileForm.addEventListener('submit', async (event) => {
                event.preventDefault();

                const novaSenha = profileSenhaInput.value;
                const confirmarSenha = profileConfirmarSenhaInput.value;

                if (novaSenha && novaSenha !== confirmarSenha) {
                    alert('A nova senha e a confirmação de senha não coincidem.');
                    return;
                }

                if (novaSenha && novaSenha.length < 6) {
                    alert('A senha deve ter no mínimo 6 caracteres.');
                    return;
                }

                const updateData = {
                    email: profileEmailInput.value,
                    senha: novaSenha || null,
                    endereco: cepMask.unmaskedValue,
                    logradouro: profileLogradouroInput.value,
                    numero: profileNumeroInput.value,
                    bairro: profileBairroInput.value,
                    cidade: profileCidadeInput.value,
                    estado: profileEstadoInput.value,
                    telefone: telefoneMask.unmaskedValue
                };

                try {
                    const response = await fetch(`/api/users/${loggedInUser.id}`, {
                        method: 'PUT',
                        credentials: 'include',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(updateData)
                    });

                    if (response.ok) {
                        const message = await response.text();
                        alert(message);
                        window.location.reload();
                    } else {
                        let errorMessage;
                        try {
                            const errorJson = await response.json();
                            errorMessage = errorJson.message || errorJson.error || JSON.stringify(errorJson);
                        } catch (jsonError) {
                            errorMessage = await response.text();
                        }
                        alert('Erro ao atualizar perfil: ' + errorMessage);
                    }
                } catch (error) {
                    console.error('Erro na requisicao de atualizacao:', error);
                    alert('Ocorreu um erro de conexão ao atualizar seu perfil.');
                }
            });

            // Logout
            logoutButton.addEventListener('click', async () => {
                await Auth.logout();
                window.location.href = 'login.html';
            });

        } else {
            window.location.href = 'login.html';
        }
    });

    // Helper functions
    function formatUserRole(tipo) {
        if (!tipo) return 'Usuário';
        const roles = {
            'ALUNO': 'Aluno',
            'DOADOR_PF': 'Doador (Pessoa Física)',
            'DOADOR_PJ': 'Doador (Pessoa Jurídica)',
            'ADMIN': 'Administrador'
        };
        return roles[tipo] || tipo;
    }

    function formatDocument(userData) {
        if (!userData.documento) return '-';
        // Format CPF/CNPJ as needed
        return userData.documento;
    }

    function getAvatarColor(name) {
        if (!name) return 'var(--primary-100)';
        const colors = [
            '#E3F2FD', '#E8F5E9', '#FFF3E0', '#F3E5F5',
            '#E0F2F1', '#FBE9E7', '#F1F8E9', '#E1F5FE'
        ];
        const charCode = name.toUpperCase().charCodeAt(0);
        return colors[charCode % colors.length];
    }
</script>
</body>
</html>
