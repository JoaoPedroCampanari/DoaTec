<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Meus Pedidos - DoaTec')}"></head>
<body>

<header th:replace="~{fragments/nav :: nav('meus-pedidos')}"></header>

<main>
    <section class="application-section">
        <div class="container">
            <div class="application-header">
                <h1>Meus Pedidos de Equipamento</h1>
                <p>Acompanhe aqui o status de todas as suas solicitações.</p>
            </div>
            <div id="pedidosContainer" class="donations-list">
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<th:block th:replace="~{fragments/scripts :: scripts('notifications,nav')}"></th:block>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const pedidosContainer = document.getElementById('pedidosContainer');

        // Verifica sessão com backend
        const loggedInUser = await Auth.checkSession();

        if (!loggedInUser || !loggedInUser.id) {
            window.location.href = '/login';
            return;
        }

        if (loggedInUser.tipoPessoa !== 'ALUNO') {
            pedidosContainer.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <h3>Acesso Restrito</h3>
                    <p>Esta página é exclusiva para alunos cadastrados.</p>
                </div>
            `;
            return;
        }

        apiFetch('/api/users/me/solicitacoes')
            .then(response => response.json())
            .then(pedidos => {
                if (pedidos.length === 0) {
                    pedidosContainer.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                                    <line x1="8" y1="21" x2="16" y2="21"/>
                                    <line x1="12" y1="17" x2="12" y2="21"/>
                                </svg>
                            </div>
                            <h3>Nenhum pedido realizado</h3>
                            <p>Você ainda não fez nenhuma solicitação de equipamento.</p>
                            <a href="/aluno" class="btn btn-primary" style="margin-top: 16px;">Fazer Solicitação</a>
                        </div>
                    `;
                    return;
                }

                pedidos.forEach(pedido => {
                    const pedidoCard = document.createElement('div');
                    pedidoCard.className = 'donation-card';

                    const statusClass = getStatusClass(pedido.status);
                    const statusText = translateStatus(pedido.status);

                    pedidoCard.innerHTML = `
                        <div class="donation-content" style="flex: 1;">
                            <div class="donation-header">
                                <h3 class="donation-title">Pedido #${pedido.id}</h3>
                                <span class="status-pill ${statusClass}">${statusText}</span>
                            </div>
                            <span class="donation-date">${formatDate(pedido.dataSolicitacao)}</span>
                            <div class="donation-meta">
                                <span class="donation-meta-item">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px;">
                                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                                        <line x1="8" y1="21" x2="16" y2="21"/>
                                        <line x1="12" y1="17" x2="12" y2="21"/>
                                    </svg>
                                    <strong>Preferência:</strong> ${escapeHtml(pedido.preferenciaEquipamento || 'Não especificada')}
                                </span>
                            </div>
                            <div class="donation-items" style="margin-top: 12px;">
                                <div class="donation-item">
                                    <strong>Justificativa:</strong>
                                    <p style="margin: 8px 0 0 0; line-height: 1.6;">${escapeHtml(pedido.justificativa || 'Não informada')}</p>
                                </div>
                            </div>
                        </div>
                    `;
                    pedidosContainer.appendChild(pedidoCard);
                });
            })
            .catch(error => {
                console.error('Erro:', error);
                pedidosContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="12" y1="8" x2="12" y2="12"/>
                                <line x1="12" y1="16" x2="12.01" y2="16"/>
                            </svg>
                        </div>
                        <h3>Erro ao carregar</h3>
                        <p style="color: var(--color-danger, #dc3545);">Ocorreu um erro ao carregar seus pedidos. Tente novamente mais tarde.</p>
                    </div>
                `;
            });
    });
</script>
</body>
</html>
