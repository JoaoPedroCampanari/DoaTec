<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login - DoaTec')}"></head>
<body class="login-page">

<div class="back-button-container">
    <a th:href="@{/index}" class="btn btn-secondary">← Voltar à Página Inicial</a>
</div>

<div class="login-container">
    <div class="login-box">
        <div class="logo">
            <a th:href="@{/index}"><img th:src="@{/doatec_logo.png}" width="200" alt="Logo DoaTec"></a>
        </div>
        <h1>Entrar na Plataforma</h1>
        <form id="loginForm" class="application-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" minlength="6" required>
            </div>
            <button type="submit" class="btn btn-primary btn-submit">Entrar</button>
        </form>
        <p class="footer-link" style="margin-top: 24px; text-align: center;">Não tem uma conta? <a th:href="@{/registro}" style="color: var(--primary-600); font-weight: 500;">Crie uma aqui</a></p>
    </div>
</div>
<th:block th:replace="~{fragments/scripts :: scripts('')}"></th:block>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const user = await Auth.checkSession();
        if (user) {
            window.location.href = '/index';
            return;
        }

        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const submitBtn = loginForm.querySelector('button[type="submit"]');
            DoaTec.setButtonLoading(submitBtn, true);

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const result = await Auth.login(email, password);

                if (result.success) {
                    window.location.href = '/index';
                } else {
                    DoaTec.showToast('Erro no login: ' + result.error, 'error');
                }
            } finally {
                DoaTec.setButtonLoading(submitBtn, false);
            }
        });
    });
</script>
</body>
</html>
