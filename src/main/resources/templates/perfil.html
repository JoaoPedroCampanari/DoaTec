<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Meu Perfil - DoaTec')}"></head>
<body class="perfil-page">
<header th:replace="~{fragments/nav :: nav('perfil')}"></header>

<main>
    <!-- Profile Hero -->
    <section class="profile-hero">
        <div class="profile-back-link">
            <a th:href="@{/index}">← Voltar para o Início</a>
        </div>
        <div class="container">
            <div class="profile-hero-avatar" id="profileAvatar">
                <span id="avatarInitial">?</span>
            </div>
            <h1 class="profile-hero-name" id="profileName">Carregando...</h1>
            <p class="profile-hero-role" id="profileRole">-</p>
        </div>
    </section>

    <!-- Profile Cards -->
    <div class="profile-cards-container">
        <!-- Card 1: Dados de Registro -->
        <section class="profile-card">
            <h2>Dados de Registro</h2>
            <div class="profile-info-grid">
                <div class="profile-info-item">
                    <label>Nome Completo</label>
                    <span id="profileNome">-</span>
                </div>
                <div class="profile-info-item">
                    <label>Tipo de Usuário</label>
                    <span id="profileTipo">-</span>
                </div>
                <div class="profile-info-item full-width">
                    <label>Documento</label>
                    <span id="profileDocumento">-</span>
                </div>
                <div class="profile-info-item" id="statsDoacoesItem" style="display:none;">
                    <label>Doações Realizadas</label>
                    <span id="profileTotalDoacoes">0</span>
                </div>
                <div class="profile-info-item" id="statsSolicitacoesItem" style="display:none;">
                    <label>Solicitações Realizadas</label>
                    <span id="profileTotalSolicitacoes">0</span>
                </div>
                <div class="profile-info-item">
                    <label>Tickets de Suporte</label>
                    <span id="profileTotalTicketsSuporte">0</span>
                </div>
            </div>
        </section>

        <!-- Card 2: Contato e Acesso -->
        <section class="profile-card">
            <h2>Contato e Acesso</h2>
            <form id="contactForm">
                <div class="profile-info-grid">
                    <div class="form-group full-width">
                        <label for="profileEmail">Email</label>
                        <input type="email" id="profileEmail">
                    </div>
                    <div class="form-group full-width">
                        <label for="profileTelefone">Telefone</label>
                        <input type="tel" id="profileTelefone" placeholder="(00) 00000-0000">
                    </div>
                    <div class="form-group">
                        <label for="profileSenha">Nova Senha</label>
                        <input type="password" id="profileSenha" minlength="6" placeholder="Deixe em branco para não alterar">
                    </div>
                    <div class="form-group">
                        <label for="profileConfirmarSenha">Confirmar Senha</label>
                        <input type="password" id="profileConfirmarSenha" minlength="6">
                    </div>
                </div>
                <div class="profile-card-actions">
                    <button type="submit" class="btn btn-primary">Salvar Contato</button>
                </div>
            </form>
        </section>

        <!-- Card 3: Endereço -->
        <section class="profile-card profile-card--full">
            <h2>Endereço</h2>
            <form id="addressForm">
                <div class="profile-info-grid">
                    <div class="form-group">
                        <label for="profileCep">CEP</label>
                        <input type="text" id="profileCep" placeholder="00000-000">
                        <small class="form-text">Digite o CEP para preencher automaticamente</small>
                    </div>
                    <div class="form-group">
                        <label for="profileNumero">Número</label>
                        <input type="text" id="profileNumero">
                    </div>
                    <div class="form-group full-width">
                        <label for="profileLogradouro">Logradouro</label>
                        <input type="text" id="profileLogradouro" readonly>
                    </div>
                    <div class="form-group">
                        <label for="profileBairro">Bairro</label>
                        <input type="text" id="profileBairro" readonly>
                    </div>
                    <div class="form-group">
                        <label for="profileCidade">Cidade</label>
                        <input type="text" id="profileCidade" readonly>
                    </div>
                    <div class="form-group">
                        <label for="profileEstado">Estado</label>
                        <input type="text" id="profileEstado" maxlength="2" readonly>
                    </div>
                </div>
                <div class="profile-card-actions">
                    <button type="submit" class="btn btn-primary">Salvar Endereço</button>
                </div>
            </form>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<th:block th:replace="~{fragments/scripts :: scripts('imask,viacep,notifications,nav')}"></th:block>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        // Form elements
        const contactForm = document.getElementById('contactForm');
        const addressForm = document.getElementById('addressForm');

        // Contact form fields
        const profileNomeSpan = document.getElementById('profileNome');
        const profileTipoSpan = document.getElementById('profileTipo');
        const profileDocumentoSpan = document.getElementById('profileDocumento');
        const profileEmailInput = document.getElementById('profileEmail');
        const profileTelefoneInput = document.getElementById('profileTelefone');
        const profileSenhaInput = document.getElementById('profileSenha');
        const profileConfirmarSenhaInput = document.getElementById('profileConfirmarSenha');

        // Address form fields
        const profileCepInput = document.getElementById('profileCep');
        const profileLogradouroInput = document.getElementById('profileLogradouro');
        const profileNumeroInput = document.getElementById('profileNumero');
        const profileBairroInput = document.getElementById('profileBairro');
        const profileCidadeInput = document.getElementById('profileCidade');
        const profileEstadoInput = document.getElementById('profileEstado');

        // Profile header elements
        const profileName = document.getElementById('profileName');
        const profileRole = document.getElementById('profileRole');
        const profileAvatar = document.getElementById('profileAvatar');
        const avatarInitial = document.getElementById('avatarInitial');

        // Masks
        const cepMask = IMask(profileCepInput, { mask: '00000-000' });
        const telefoneMask = IMask(profileTelefoneInput, { mask: '(00) 00000-0000' });

        // Verifica sessão com o backend
        const loggedInUser = await Auth.checkSession();

        if (loggedInUser && loggedInUser.id) {
            // Set avatar initial
            const name = loggedInUser.nome || 'U';
            avatarInitial.textContent = name.charAt(0).toUpperCase();
            profileAvatar.style.backgroundColor = getAvatarColor(name);

            apiFetch('/api/users/me')
                .then(response => {
                    if (response.ok) {
                        return response.json();
                    }
                    throw new Error('Falha ao carregar dados do perfil.');
                })
                .then(userData => {
                    // Update header
                    profileName.textContent = userData.nome || 'Usuário';
                    profileRole.textContent = formatUserRole(userData.tipoPessoa);

                    // Update card 1 (readonly)
                    profileNomeSpan.textContent = userData.nome || '-';
                    profileTipoSpan.textContent = formatUserRole(userData.tipoPessoa);
                    profileDocumentoSpan.textContent = formatDocument(userData);

                    // Estatísticas do usuário
                    const tipo = userData.tipoPessoa;
                    if (tipo === 'DOADOR_PF' || tipo === 'DOADOR_PJ') {
                        document.getElementById('statsDoacoesItem').style.display = '';
                        document.getElementById('profileTotalDoacoes').textContent = userData.totalDoacoes || 0;
                    } else if (tipo === 'ALUNO') {
                        document.getElementById('statsSolicitacoesItem').style.display = '';
                        document.getElementById('profileTotalSolicitacoes').textContent = userData.totalSolicitacoes || 0;
                    }
                    document.getElementById('profileTotalTicketsSuporte').textContent = userData.totalTicketsSuporte || 0;

                    // Update card 2 (contact)
                    profileEmailInput.value = userData.email || '';
                    telefoneMask.value = userData.telefone || '';

                    // Update card 3 (address)
                    cepMask.value = userData.cep || '';
                    profileLogradouroInput.value = userData.logradouro || '';
                    profileNumeroInput.value = userData.numero || '';
                    profileBairroInput.value = userData.bairro || '';
                    profileCidadeInput.value = userData.cidade || '';
                    profileEstadoInput.value = userData.estado || '';

                    // Marca campos preenchidos via CEP
                    if (userData.logradouro || userData.bairro || userData.cidade) {
                        ['logradouro', 'bairro', 'cidade', 'estado'].forEach(id => {
                            const el = document.getElementById('profile' + id.charAt(0).toUpperCase() + id.slice(1));
                            if (el) el.classList.add('viacep-auto');
                        });
                    }
                })
                .catch(error => {
                    console.error('Erro ao carregar perfil:', error);
                    DoaTec.showToast('Não foi possível carregar os dados do seu perfil.', 'error');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                });

            // ViaCEP auto-fill (using shared utility)
            const viacepFields = {
                logradouro: profileLogradouroInput,
                bairro: profileBairroInput,
                cidade: profileCidadeInput,
                estado: profileEstadoInput,
                numero: profileNumeroInput
            };
            DoaTec.initViaCEP(profileCepInput, viacepFields, { cepMask });

            // Contact form submit
            contactForm.addEventListener('submit', async (event) => {
                event.preventDefault();

                const novaSenha = profileSenhaInput.value;
                const confirmarSenha = profileConfirmarSenhaInput.value;

                if (novaSenha && novaSenha !== confirmarSenha) {
                    DoaTec.showToast('A nova senha e a confirmação não coincidem.', 'error');
                    return;
                }

                if (novaSenha && novaSenha.length < 6) {
                    DoaTec.showToast('A senha deve ter no mínimo 6 caracteres.', 'error');
                    return;
                }

                const updateData = {
                    email: profileEmailInput.value,
                    senha: novaSenha || null,
                    telefone: telefoneMask.unmaskedValue
                };

                try {
                    const response = await apiFetch('/api/users/me', {
                        method: 'PUT',
                        credentials: 'include',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(updateData)
                    });

                    if (response.ok) {
                        DoaTec.showToast('Contato atualizado com sucesso!', 'success');
                        profileSenhaInput.value = '';
                        profileConfirmarSenhaInput.value = '';
                    } else {
                        const errorData = await response.json().catch(() => ({}));
                        DoaTec.showToast(errorData.message || 'Erro ao atualizar contato.', 'error');
                    }
                } catch (error) {
                    console.error('Erro:', error);
                    DoaTec.showToast('Erro de conexão ao atualizar contato.', 'error');
                }
            });

            // Address form submit
            addressForm.addEventListener('submit', async (event) => {
                event.preventDefault();

                const updateData = {
                    endereco: cepMask.unmaskedValue,
                    logradouro: profileLogradouroInput.value,
                    numero: profileNumeroInput.value,
                    bairro: profileBairroInput.value,
                    cidade: profileCidadeInput.value,
                    estado: profileEstadoInput.value
                };

                try {
                    const response = await apiFetch('/api/users/me', {
                        method: 'PUT',
                        credentials: 'include',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(updateData)
                    });

                    if (response.ok) {
                        DoaTec.showToast('Endereço atualizado com sucesso!', 'success');
                    } else {
                        const errorData = await response.json().catch(() => ({}));
                        DoaTec.showToast(errorData.message || 'Erro ao atualizar endereço.', 'error');
                    }
                } catch (error) {
                    console.error('Erro:', error);
                    DoaTec.showToast('Erro de conexão ao atualizar endereço.', 'error');
                }
            });

        } else {
            window.location.href = '/login';
        }
    });

    // Helper functions (from DoaTec)
    const formatUserRole = DoaTec.formatUserRole;
    const formatDocument = DoaTec.formatDocument;
    const getAvatarColor = DoaTec.getAvatarColor;
</script>
</body>
</html>
