<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<nav th:fragment="nav(activePage)" class="navbar">
    <div class="logo"><a th:href="@{/index}"><img th:src="@{/doatec_logo.png}" width="180" alt="Logo DoaTec"></a></div>
    <ul class="nav-links">
        <li><a th:href="@{/index}" th:classappend="${activePage == 'index'} ? 'active'">Início</a></li>
        <li id="queroDoarDropdownItem" class="nav-dropdown">
            <a href="#">Quero Doar</a>
            <ul class="dropdown-menu"></ul>
        </li>
        <li id="solicitarDoacaoDropdownItem" class="nav-dropdown">
            <a href="#">Solicitar Doação</a>
            <ul class="dropdown-menu"></ul>
        </li>
        <li><a th:href="@{/suporte}" th:classappend="${activePage == 'suporte'} ? 'active'">Suporte</a></li>
        <li><a th:href="@{/sobre}" th:classappend="${activePage == 'sobre'} ? 'active'">Sobre Nós</a></li>
    </ul>
    <div class="navbar-right">
        <!-- Notificações -->
        <div id="notificationsContainer" class="notification-container">
            <button class="notification-bell" title="Notificações">🔔</button>
            <span class="notification-badge"></span>
            <div class="notification-dropdown">
                <div class="notification-header">
                    <h4>Notificações</h4>
                    <button onclick="Notifications.markAllAsRead()">Marcar todas como lidas</button>
                </div>
                <div class="notifications-list"></div>
            </div>
        </div>
        <button id="theme-toggle" class="btn-theme-toggle">🌙</button>
        <ul class="nav-links-account">
            <li id="minhaContaDropdownItem" class="nav-dropdown">
                <a href="#">Minha Conta</a>
                <ul class="dropdown-menu"></ul>
            </li>
        </ul>
        <button id="profileButton" class="btn btn-primary" style="margin-left: 10px; display: none;">Entrar</button>
        <div class="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</nav>
