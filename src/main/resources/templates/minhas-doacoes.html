<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Minhas Doações - DoaTec')}"></head>
<body>

<header th:replace="~{fragments/nav :: nav('minhas-doacoes')}"></header>

<main>
    <section class="application-section">
        <div class="container">
            <div class="application-header">
                <h1>Minhas Doações</h1>
                <p>Confira o histórico de todas as doações que você realizou na nossa plataforma. Agradecemos sua contribuição!</p>
            </div>

            <div id="donationsContainer" class="donations-list">
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<th:block th:replace="~{fragments/scripts :: scripts('notifications,nav')}"></th:block>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const donationsContainer = document.getElementById('donationsContainer');

        // Verifica sessão com backend
        const loggedInUser = await Auth.checkSession();

        if (!loggedInUser || !loggedInUser.id) {
            window.location.href = '/login';
            return;
        }

        // Fetch donations
        apiFetch('/api/users/me/donations')
            .then(response => response.json())
            .then(donations => {
                if (donations.length === 0) {
                    // Create empty state
                    const emptyState = document.createElement('div');
                    emptyState.className = 'empty-state';
                    emptyState.innerHTML = `
                        <div class="empty-state-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="20 12 20 22 4 22 4 12"/>
                                <rect x="2" y="7" width="20" height="5"/>
                                <line x1="12" y1="22" x2="12" y2="7"/>
                                <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/>
                                <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
                            </svg>
                        </div>
                        <h3>Nenhuma doação realizada</h3>
                        <p>Você ainda não fez nenhuma doação. Que tal fazer sua primeira doação?</p>
                        <a href="/donate" class="btn btn-primary" style="margin-top: 16px;">Fazer Doação</a>
                    `;
                    donationsContainer.appendChild(emptyState);
                    return;
                }

                // Create cards for each donation
                donations.forEach(donation => {
                    const statusClass = getStatusClass(donation.status);
                    const statusText = translateStatus(donation.status);

                    const donationCard = document.createElement('div');
                    donationCard.className = 'donation-card';

                    // Build items HTML
                    let itemsHtml = '';
                    if (donation.itens && donation.itens.length > 0) {
                        itemsHtml = '<div class="donation-items">';
                        donation.itens.forEach(item => {
                            itemsHtml += `
                                <div class="donation-item">
                                    <strong>${escapeHtml(item.tipoItem)}</strong>
                                    ${item.descricao ? ': ' + escapeHtml(item.descricao) : ''}
                                </div>
                            `;
                        });
                        itemsHtml += '</div>';
                    }

                    donationCard.innerHTML = `
                        <div class="donation-content" style="flex: 1;">
                            <div class="donation-header">
                                <h3 class="donation-title">Doação #${donation.id}</h3>
                                <span class="status-pill ${statusClass}">${statusText}</span>
                            </div>
                            <span class="donation-date">${formatDate(donation.dataDoacao)}</span>
                            <div class="donation-meta">
                                <span class="donation-meta-item">
                                    <strong>Entrega:</strong> ${escapeHtml(donation.preferenciaEntrega || 'Não especificada')}
                                </span>
                            </div>
                            ${itemsHtml}
                        </div>
                    `;

                    donationsContainer.appendChild(donationCard);
                });
            })
            .catch(error => {
                console.error('Erro ao buscar doações:', error);
                donationsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="12" y1="8" x2="12" y2="12"/>
                                <line x1="12" y1="16" x2="12.01" y2="16"/>
                            </svg>
                        </div>
                        <h3>Erro ao carregar</h3>
                        <p style="color: var(--color-danger, #dc3545);">Ocorreu um erro ao carregar suas doações. Tente novamente mais tarde.</p>
                    </div>
                `;
            });
    });
</script>
</body>
</html>
