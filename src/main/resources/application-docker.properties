# Database configuration for Docker with PostgreSQL
spring.datasource.url=jdbc:postgresql://db:5432/doatec
spring.datasource.username=doatec_user
spring.datasource.password=doatec_password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
upload.path=uploads

# H2 Console (disabled in docker)
spring.h2.console.enabled=false

# CORS (Docker environment)
app.cors.allowed-origins=http://localhost,http://localhost:8080,http://localhost:8081